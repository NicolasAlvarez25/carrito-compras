name: CI - Carrito de Compras

on:
  push:
    branches: [ main, qa, develop ]
  pull_request:
    branches: [ main, qa, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: carrito_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a mvnw
        run: chmod +x mvnw

      - name: Compilar y ejecutar tests
        run: ./mvnw verify -Dspring.profiles.active=dev
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/carrito_dev
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 123